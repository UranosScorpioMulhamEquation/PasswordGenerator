name: Build Flet APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet CLI
        run: pip install flet==0.28.3

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Build APK
        run: flet build apk --yes --build-number 1 --build-version 1.0.0
        #                ^^^^^ هذا السطر الجديد. يوافق تلقائي بدون سؤال

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HENPersonalRadar-APK
          path: build/apk/*.apk
          retention-days: 7
